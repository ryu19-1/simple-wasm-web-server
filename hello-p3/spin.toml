#:schema https://schemas.spinframework.dev/spin/manifest-v2/latest.json

spin_manifest_version = 2

[application]
name = "hello-p3"
version = "0.1.0"
authors = ["Ryuki Kamikubo <ryuki.kamikubo@estie.co.jp>"]
description = "WASIp3を試すWebアプリケーション"

# wasm-auth-middleware: 公開エンドポイント（全リクエストを受ける）
[[trigger.http]]
route = "/..."
component = "wasm-auth-middleware"

# hello-p3: プライベートエンドポイント（Service Chaining経由のみ）
[[trigger.http]]
route = { private = true }
component = "hello-p3"
executor = { type = "wasip3-unstable" }

[component.wasm-auth-middleware]
source = "wasm-auth-middleware/target/wasm32-wasip2/release/wasm_auth_middleware.wasm"
allowed_outbound_hosts = ["http://hello-p3.spin.internal"]
[component.wasm-auth-middleware.build]
command = "cargo build --target wasm32-wasip2 --release --manifest-path wasm-auth-middleware/Cargo.toml"
watch = ["wasm-auth-middleware/src/**/*.rs", "wasm-auth-middleware/Cargo.toml"]

[component.hello-p3]
source = "target/wasm32-wasip2/release/hello_p3.wasm"
allowed_outbound_hosts = []
[component.hello-p3.build]
command = "cargo build --target wasm32-wasip2 --release"
watch = ["src/**/*.rs", "Cargo.toml"]
